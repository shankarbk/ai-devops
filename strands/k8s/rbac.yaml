# ServiceAccount: the "identity" of our agent pod
# Think of it like a user account, but for pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-agent-sa
  namespace: default
  annotations:
        # IRSA: links this ServiceAccount to the IAM role Terraform created.
    # EKS injects temporary AWS credentials into pods using this SA.
    # Replace with your actual role ARN from: terraform output agent_role_arn
    eks.amazonaws.com/role-arn: "${AGENT_ROLE_ARN}"
---
# ClusterRole: defines WHAT the agent is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent-role
rules:
# Rule 1: Read pods and fetch their logs
- apiGroups: [""]            # "" = core API group (pods, services, etc.)
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
# Rule 2: Delete pods (triggers restart via ReplicaSet)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]
# Rule 3: Read and scale Deployments
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch", "update"]
---
# ClusterRoleBinding: binds the role to the ServiceAccount
# "devops-agent ServiceAccount in namespace default gets devops-agent-role"
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-agent-role
subjects:
- kind: ServiceAccount
  name: devops-agent
  namespace: default