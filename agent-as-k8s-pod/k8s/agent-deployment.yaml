apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-agent
  template:
    metadata:
      labels:
        app: devops-agent
    spec:
            # Use the ServiceAccount we created in rbac.yaml
      # This gives the pod its RBAC permissions AND triggers IRSA for AWS creds
      serviceAccountName: devops-agent-sa
      containers:
      - name: agent
                # Replace with your ECR URL from: terraform output ecr_repository_url
        image: "${ECR_URL}:latest"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: K8S_NAMESPACE
          value: "default"
        resources:
          limits:
            memory: "256Mi"
            cpu:    "250m"
          requests:
            memory: "128Mi"
            cpu:    "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-agent-svc
  namespace: default
spec:
  selector:
    app: devops-agent
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP     # Internal only — no LoadBalancer cost ($0.025/hr)