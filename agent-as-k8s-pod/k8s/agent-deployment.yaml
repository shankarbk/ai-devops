apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-agent
  namespace: default
spec:
  replicas: 1

  # Zero-downtime updates: spin up new pod before killing old one
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: devops-agent
  template:
    metadata:
      labels:
        app: devops-agent
    spec:
      serviceAccountName: devops-agent
      restartPolicy: Always           # default, written explicitly for clarity
      terminationGracePeriodSeconds: 30  # lets in-flight Bedrock calls finish

      containers:
      - name: agent
        image: "${ECR_URL}:latest"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: K8S_NAMESPACE
          value: "default"

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"   # OOMKill if exceeded — prevents runaway leaks
            cpu: "500m"

        # Gives extra time on first boot before liveness kicks in.
        # Without this, liveness restarts a slow-starting pod in a loop.
        # 30 attempts × 5s = 150 seconds maximum startup time allowed.
        startupProbe:
          httpGet:
            path: /ping
            port: 8080
          failureThreshold: 30
          periodSeconds: 5

        # Detects hangs — process alive but frozen waiting on Bedrock.
        # Kills and restarts the pod after 3 consecutive failures (45s).
        # This is the most important probe to add.
        livenessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5

        # Stops traffic reaching the pod until it's actually ready.
        # During a restart, old pod keeps serving until new one passes this.
        readinessProbe:
          httpGet:
            path: /ping
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: devops-agent-svc
  namespace: default
spec:
  selector:
    app: devops-agent
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
---
# Ensures at least 1 pod stays up during voluntary disruptions
# (node drain, cluster upgrade). Without this, kubectl drain would
# kill your only agent pod with no replacement ready.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devops-agent-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: devops-agent